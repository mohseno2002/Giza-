<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>الأورنيك التصميمى للترع — الإدارة العامة لرى الجيزة</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&family=Tajawal:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --navy: #0a1628;
  --navy2: #0d2040;
  --blue: #1a3a6b;
  --accent: #2196F3;
  --accent2: #00bcd4;
  --gold: #f4c542;
  --water: #4fc3f7;
  --water-deep: #0277bd;
  --earth: #8d6e63;
  --earth2: #6d4c41;
  --grass: #66bb6a;
  --white: #f0f6ff;
  --light: #e3eeff;
  --muted: #90a4bd;
  --card: rgba(255,255,255,0.05);
  --border: rgba(100,160,255,0.15);
  --shadow: 0 8px 32px rgba(0,0,0,0.4);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Cairo',sans-serif;background:var(--navy);color:var(--white);min-height:100vh;overflow-x:hidden}

/* HEADER */
.header{background:linear-gradient(135deg,#071020 0%,#0d2040 40%,#0a1628 100%);border-bottom:1px solid var(--border);padding:0;position:sticky;top:0;z-index:100;box-shadow:0 4px 20px rgba(0,0,0,0.5)}
.header-inner{display:flex;align-items:center;gap:16px;padding:12px 20px}
.logo{width:46px;height:46px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;box-shadow:0 4px 15px rgba(33,150,243,0.3)}
.header-text h1{font-size:17px;font-weight:700;color:var(--white);line-height:1.2}
.header-text p{font-size:11px;color:var(--muted);font-family:'Tajawal'}
.header-stats{display:flex;gap:16px;margin-right:auto;margin-left:0}
.stat-pill{background:rgba(33,150,243,0.12);border:1px solid rgba(33,150,243,0.2);border-radius:20px;padding:5px 14px;text-align:center}
.stat-pill .n{font-size:18px;font-weight:700;color:var(--accent2);display:block;line-height:1}
.stat-pill .l{font-size:10px;color:var(--muted)}

/* LAYOUT */
.app{display:flex;height:calc(100vh - 70px)}

/* SIDEBAR */
.sidebar{width:300px;flex-shrink:0;background:var(--navy2);border-left:1px solid var(--border);overflow-y:auto;display:flex;flex-direction:column}
.sidebar::-webkit-scrollbar{width:4px}
.sidebar::-webkit-scrollbar-track{background:transparent}
.sidebar::-webkit-scrollbar-thumb{background:var(--blue);border-radius:2px}

.search-box{padding:12px;border-bottom:1px solid var(--border)}
.search-input{width:100%;background:rgba(255,255,255,0.07);border:1px solid var(--border);border-radius:10px;padding:10px 14px;color:var(--white);font-family:'Cairo';font-size:13px;outline:none;transition:all .3s}
.search-input::placeholder{color:var(--muted)}
.search-input:focus{border-color:var(--accent);background:rgba(33,150,243,0.08)}

.district-tabs{display:flex;flex-wrap:wrap;gap:6px;padding:10px 12px;border-bottom:1px solid var(--border)}
.dtab{background:rgba(255,255,255,0.05);border:1px solid var(--border);border-radius:8px;padding:5px 10px;font-size:11px;color:var(--muted);cursor:pointer;transition:all .2s;font-family:'Tajawal'}
.dtab:hover{border-color:var(--accent);color:var(--white)}
.dtab.active{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:600}

.canal-list{flex:1;overflow-y:auto;padding:8px}
.canal-item{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:10px 12px;margin-bottom:6px;cursor:pointer;transition:all .25s}
.canal-item:hover{border-color:rgba(33,150,243,0.4);background:rgba(33,150,243,0.08);transform:translateX(-2px)}
.canal-item.active{border-color:var(--accent);background:rgba(33,150,243,0.15);box-shadow:0 0 0 1px rgba(33,150,243,0.3)}
.canal-num{display:inline-block;background:rgba(33,150,243,0.2);color:var(--accent2);font-size:10px;font-weight:700;padding:2px 7px;border-radius:5px;margin-bottom:4px}
.canal-name{font-size:13px;font-weight:600;color:var(--white);margin-bottom:3px}
.canal-meta{display:flex;gap:8px;font-size:10px;color:var(--muted)}
.tag{background:rgba(255,255,255,0.05);border-radius:4px;padding:2px 6px}

/* MAIN */
.main{flex:1;overflow-y:auto;background:linear-gradient(180deg,#0a1628 0%,#071020 100%)}
.main::-webkit-scrollbar{width:6px}
.main::-webkit-scrollbar-track{background:transparent}
.main::-webkit-scrollbar-thumb{background:var(--blue);border-radius:3px}

/* WELCOME */
.welcome{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;text-align:center;padding:40px}
.welcome-icon{font-size:64px;margin-bottom:20px;opacity:.6}
.welcome h2{font-size:24px;font-weight:700;color:var(--white);margin-bottom:10px}
.welcome p{color:var(--muted);font-family:'Tajawal';max-width:380px;line-height:1.8}

/* DETAIL PANEL */
.detail{padding:20px;display:none}
.detail.show{display:block}

.canal-header{background:linear-gradient(135deg,var(--blue),#0d2040);border:1px solid rgba(33,150,243,0.3);border-radius:16px;padding:20px;margin-bottom:20px;position:relative;overflow:hidden}
.canal-header::before{content:'';position:absolute;top:-30px;left:-30px;width:200px;height:200px;background:radial-gradient(circle,rgba(33,150,243,0.1),transparent);border-radius:50%}
.ch-badge{display:inline-flex;align-items:center;gap:6px;background:rgba(33,150,243,0.2);border:1px solid rgba(33,150,243,0.3);border-radius:8px;padding:4px 12px;font-size:11px;color:var(--accent2);margin-bottom:10px}
.ch-name{font-size:22px;font-weight:900;color:var(--white);margin-bottom:12px}
.ch-district{font-size:12px;color:var(--muted);margin-bottom:14px}
.ch-kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.kpi{background:rgba(0,0,0,0.3);border-radius:10px;padding:12px;text-align:center}
.kpi-val{font-size:18px;font-weight:700;color:var(--accent2);display:block}
.kpi-label{font-size:10px;color:var(--muted);margin-top:3px}

/* SECTION TITLES */
.section-title{display:flex;align-items:center;gap:10px;font-size:14px;font-weight:700;color:var(--accent2);margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--border)}
.section-title::before{content:'';display:block;width:3px;height:16px;background:var(--accent);border-radius:2px}

/* SEGMENTS TABLE */
.segments-section{margin-bottom:20px}
.seg-table{width:100%;border-collapse:collapse;background:rgba(255,255,255,0.02);border-radius:12px;overflow:hidden;border:1px solid var(--border)}
.seg-table th{background:rgba(33,150,243,0.12);padding:10px 12px;font-size:11px;color:var(--accent2);font-weight:600;text-align:center;border-bottom:1px solid var(--border);white-space:nowrap}
.seg-table td{padding:9px 12px;font-size:12px;color:var(--white);text-align:center;border-bottom:1px solid rgba(255,255,255,0.04)}
.seg-table tr:last-child td{border-bottom:none}
.seg-table tr:hover td{background:rgba(33,150,243,0.06)}
.seg-idx{background:rgba(33,150,243,0.15);color:var(--accent2);font-weight:700;width:28px;height:28px;border-radius:6px;display:inline-flex;align-items:center;justify-content:center;font-size:11px}

/* CROSS SECTION CANVAS */
.cross-section-wrap{background:rgba(0,0,0,0.3);border:1px solid var(--border);border-radius:16px;padding:16px;margin-bottom:20px}
.cs-controls{display:flex;align-items:center;gap:12px;margin-bottom:14px;flex-wrap:wrap}
.cs-label{font-size:12px;color:var(--muted);font-family:'Tajawal'}
.cs-select{background:rgba(255,255,255,0.07);border:1px solid var(--border);border-radius:8px;padding:6px 12px;color:var(--white);font-family:'Cairo';font-size:12px;outline:none;cursor:pointer}
.cs-select option{background:#0d2040}
canvas#crossSection{width:100%;display:block;background:#fff;border-radius:6px;border:1px solid #e8eef4}
.cs-legend{display:flex;gap:16px;margin-top:10px;flex-wrap:wrap}
.leg-item{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--muted)}
.leg-dot{width:12px;height:12px;border-radius:3px;flex-shrink:0}

/* INFO GRID */
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px}
.info-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px}
.info-card-label{font-size:10px;color:var(--muted);margin-bottom:4px;font-family:'Tajawal'}
.info-card-val{font-size:14px;font-weight:600;color:var(--white)}

/* PROFILE CHART */
.profile-wrap{background:rgba(0,0,0,0.3);border:1px solid var(--border);border-radius:16px;padding:16px;margin-bottom:20px}
canvas#profileChart{width:100%;border-radius:8px;display:block}

/* MOBILE */
@media(max-width:768px){
  .header-stats{display:none}
  .app{flex-direction:column;height:auto}
  .sidebar{width:100%;height:auto;max-height:50vh}
  .ch-kpis{grid-template-columns:1fr 1fr}
  .info-grid{grid-template-columns:1fr}
}

/* ANIMATIONS */
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.detail.show{animation:fadeIn .3s ease}
.canal-item{animation:fadeIn .2s ease both}

/* EMPTY */
.empty{text-align:center;padding:40px;color:var(--muted);font-family:'Tajawal'}

/* FLOW BADGES */
.flow-badge{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:6px;font-size:10px;font-weight:600}
.flow-a{background:rgba(76,175,80,.15);color:#81c784;border:1px solid rgba(76,175,80,.3)}
.flow-b{background:rgba(255,193,7,.15);color:#ffd54f;border:1px solid rgba(255,193,7,.3)}
.flow-c{background:rgba(33,150,243,.15);color:#64b5f6;border:1px solid rgba(33,150,243,.3)}

/* PRINT BUTTON */
.print-btn{display:inline-flex;align-items:center;gap:7px;background:linear-gradient(135deg,#1565c0,#1e88e5);border:none;border-radius:9px;padding:9px 18px;color:#fff;font-family:'Cairo';font-size:13px;font-weight:600;cursor:pointer;margin-bottom:16px;box-shadow:0 4px 14px rgba(21,101,192,0.35);transition:all .2s}
.print-btn:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(21,101,192,0.5)}
.print-btn svg{width:16px;height:16px;fill:currentColor}

/* ── PRINT STYLES ── */
@media print {
  @page {
    size: A4 portrait;
    margin: 15mm 12mm 15mm 12mm;
  }

  /* Hide everything except the print frame */
  body { background: #fff !important; color: #000 !important; }
  .header, .sidebar, .welcome, .print-btn { display: none !important; }
  .app { display: block !important; height: auto !important; }
  .main { overflow: visible !important; height: auto !important; }
  .detail { display: block !important; padding: 0 !important; }

  /* Print header */
  .print-header { display: block !important; }

  /* Canal header */
  .canal-header {
    background: #003366 !important;
    -webkit-print-color-adjust: exact;
    print-color-adjust: exact;
    color: #fff !important;
    border-radius: 8px !important;
    page-break-inside: avoid;
  }
  .ch-name { color: #fff !important; }
  .ch-district { color: #cce !important; }
  .kpi { background: rgba(0,0,0,0.3) !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  .kpi-val { color: #7fffff !important; }
  .kpi-label { color: #aac !important; }
  .ch-badge { color: #7fffff !important; }

  /* Sections */
  .cross-section-wrap, .profile-wrap, .segments-section, .info-grid {
    page-break-inside: avoid;
    margin-bottom: 12px !important;
    border: 1px solid #ccd !important;
    background: #f8faff !important;
    -webkit-print-color-adjust: exact;
    print-color-adjust: exact;
  }

  .section-title { color: #003366 !important; border-bottom-color: #99b !important; }
  .section-title::before { background: #003366 !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }

  /* Table */
  .seg-table { border: 1px solid #bbc !important; }
  .seg-table th { background: #e8eeff !important; color: #003366 !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  .seg-table td { color: #111 !important; border-bottom: 1px solid #dde !important; }
  .seg-table tr:hover td { background: none !important; }
  .seg-idx { background: #ddeeff !important; color: #003366 !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }

  /* Canvas: force visible */
  canvas { display: block !important; max-width: 100% !important; }

  /* Info cards */
  .info-card { border: 1px solid #ccd !important; background: #f5f7ff !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  .info-card-label { color: #556 !important; }
  .info-card-val { color: #002 !important; }

  /* CS controls: hide select, keep title */
  .cs-controls { display: none !important; }

  /* Legend */
  .cs-legend .leg-item { color: #333 !important; }

  /* Flow badges */
  .flow-a { background: #e8ffe8 !important; color: #2a7a2a !important; border-color: #aaddaa !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  .flow-b { background: #fffbe8 !important; color: #7a6a00 !important; border-color: #ddcc88 !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  .flow-c { background: #e8f0ff !important; color: #1a3a8a !important; border-color: #99aadd !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
}
</style>

    <div class="canal-list" id="canalList"></div>

</div>

// ─── STATE ───────────────────────────────────────────────────
let currentDistrict = null;
let currentCanal = null;
let allCanals = []; // flat list {district, canal}

// ─── INIT ─────────────────────────────────────────────────────
function init() {
  // Build flat list
  for (const [d, canals] of Object.entries(DATA)) {
    for (const c of canals) allCanals.push({district: d, canal: c});
  }

  // Stats
  const totalFed = allCanals.reduce((a,x) => a + (x.canal.area||0), 0);
  document.getElementById('totalArea').textContent = Math.round(totalFed/1000)+'K';

  // District tabs
  const tabs = document.getElementById('districtTabs');
  const allTab = document.createElement('div');
  allTab.className = 'dtab active'; allTab.textContent = 'الكل';
  allTab.onclick = () => setDistrict(null);
  tabs.appendChild(allTab);
  for (const d of Object.keys(DATA)) {
    const tab = document.createElement('div');
    tab.className = 'dtab';
    // shorten name
    tab.textContent = d.replace('هندسة رى ','');
    tab.onclick = () => setDistrict(d);
    tabs.appendChild(tab);
  }

  renderList(allCanals);
}

function setDistrict(d) {
  currentDistrict = d;
  document.querySelectorAll('.dtab').forEach((t,i) => {
    t.classList.toggle('active', d === null ? i===0 : t.textContent === d.replace('هندسة رى ',''));
  });
  filterCanals(document.getElementById('searchInput').value);
}

function filterCanals(q) {
  const items = currentDistrict
    ? allCanals.filter(x => x.district === currentDistrict)
    : allCanals;
  const filtered = q ? items.filter(x => x.canal.name.includes(q)) : items;
  renderList(filtered);
}

function renderList(items) {
  const list = document.getElementById('canalList');
  list.innerHTML = '';
  if (!items.length) { list.innerHTML = '<div class="empty">لا توجد نتائج</div>'; return; }
  items.forEach((x, i) => {
    const c = x.canal;
    const div = document.createElement('div');
    div.className = 'canal-item' + (currentCanal && currentCanal.name === c.name ? ' active' : '');
    div.style.animationDelay = Math.min(i*15,300)+'ms';
    const seg0 = c.segments[0];
    div.innerHTML = `
      <div><span class="canal-num">${c.id}</span></div>
      <div class="canal-name">${c.name}</div>
      <div class="canal-meta">
        <span class="tag">📏 ${c.total_length || '-'} كم</span>
        <span class="tag">🌾 ${c.area ? c.area.toLocaleString() : '-'} فدان</span>
        ${c.feeder ? `<span class="tag">← ${c.feeder}</span>` : ''}
      </div>`;
    div.onclick = () => showCanal(x.district, c, div);
    list.appendChild(div);
  });
}

// ─── SHOW CANAL ───────────────────────────────────────────────
function goBack() {
  currentCanal = null;
  document.querySelectorAll('.canal-item').forEach(e => e.classList.remove('active'));
  document.getElementById('welcome').style.display = '';
  document.getElementById('detail').className = 'detail';
  document.getElementById('backBtn').style.display = 'none';
}


function buildHydroCard(canal) {
  const s = canal.segments[0];
  if(!s) return '';
  const bw=parseFloat(s.base_width)||0, bl=parseFloat(s.base_level)||0;
  const mxwl=parseFloat(s.max_wl)||bl+2, mnwl=parseFloat(s.min_wl)||bl+1;
  const bgrd=parseFloat(s.base_grad)||5;
  const sm=(s.side_slope||'1:1').match(/(\d+(?:\.\d+)?):(\d+(?:\.\d+)?)/);
  const z=sm?parseFloat(sm[1])/parseFloat(sm[2]):1;
  const d=Math.max(0.1,mxwl-bl);
  const A=(bw+z*d)*d, P=bw+2*d*Math.sqrt(1+z*z), R=A/P, S=bgrd/100000;
  const V=(1/0.025)*Math.pow(R,2/3)*Math.pow(S,0.5);
  const Q_cms=A*V, Q_mmd=(Q_cms*86400/1e6).toFixed(3);
  const gaugeW=Math.min(100,Math.round(d/(mxwl-bl+0.001)*100));
  const gc=gaugeW>90?'#ef5350':gaugeW>60?'#ffd54f':'#66bb6a';
  return '<div style="background:rgba(0,0,0,.25);border:1px solid rgba(100,160,255,.15);border-radius:14px;padding:14px;margin-bottom:18px">'
    +'<div style="display:flex;align-items:center;gap:8px;font-size:13px;font-weight:700;color:#00bcd4;margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid rgba(100,160,255,.12)">'
    +'<span style="display:block;width:3px;height:14px;background:#2196F3;border-radius:2px"></span>'
    +'🧮 الحسابات الهيدروليكية — معادلة مانينج (n=0.025)'
    +'</div>'
    +'<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px">'
    +mVal('A','مساحة القطاع',A.toFixed(2),'م²','#4fc3f7',false)
    +mVal('R','نصف القطر الهيدروليكي',R.toFixed(3),'م','#4fc3f7',false)
    +mVal('V','السرعة',V.toFixed(3),'م/ث','#4fc3f7',false)
    +mVal('Q','التصرف التصميمي',Q_cms.toFixed(2),'م³/ث','#00bcd4',true)
    +mVal('Q','يومي',Q_mmd,'م.م³/يوم','#00bcd4',true)
    +mVal('S','الميل ×10⁻⁵',(S*100000).toFixed(1),'n=0.025','#4fc3f7',false)
    +'</div>'
    +'<div style="font-size:10px;color:#90a4bd;margin-bottom:5px;font-weight:700">📊 مؤشر الاستغلال الهيدروليكي</div>'
    +'<div style="height:12px;background:rgba(255,255,255,.08);border-radius:6px;overflow:hidden;margin-bottom:4px">'
    +'<div style="width:'+gaugeW+'%;height:100%;background:'+gc+';border-radius:6px"></div>'
    +'</div>'
    +'<div style="display:flex;justify-content:space-between;font-size:9px;color:#90a4bd">'
    +'<span>منسوب القاع: '+bl.toFixed(2)+' م</span>'
    +'<span style="font-weight:900;color:'+gc+'">'+gaugeW+'% استغلال</span>'
    +'<span>أقصى منسوب: '+mxwl.toFixed(2)+' م</span>'
    +'</div>'
    +'<div style="margin-top:8px;display:grid;grid-template-columns:1fr 1fr;gap:6px">'
    +'<div style="background:rgba(129,199,132,.08);border:1px solid rgba(129,199,132,.2);border-radius:7px;padding:7px;text-align:center">'
    +'<div style="font-size:9px;color:#81c784">أدنى منسوب تشغيل</div>'
    +'<div style="font-size:15px;font-weight:900;color:#81c784">'+mnwl.toFixed(2)+' م</div>'
    +'</div>'
    +'<div style="background:rgba(79,195,247,.08);border:1px solid rgba(79,195,247,.2);border-radius:7px;padding:7px;text-align:center">'
    +'<div style="font-size:9px;color:#4fc3f7">أقصى منسوب تشغيل</div>'
    +'<div style="font-size:15px;font-weight:900;color:#4fc3f7">'+mxwl.toFixed(2)+' م</div>'
    +'</div>'
    +'</div>'
    +'</div>';
}

function mVal(sym, lbl, val, unit, col, highlight) {
  const bg = highlight ? 'rgba(33,150,243,.1)' : 'rgba(255,255,255,.04)';
  const border = highlight ? 'border:1px solid rgba(33,150,243,.25);' : '';
  return '<div style="background:'+bg+';'+border+'border-radius:9px;padding:10px;text-align:center">'

    +'</div>';
}

// ─── CROSS SECTION DRAWING ────────────────────────────────────
function drawCrossSection(canal) {
  const idx = parseInt(document.getElementById('segSelect').value) || 0;
  const seg = canal.segments[idx];
  if (!seg) return;

  const canvas = document.getElementById('crossSection');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');

  // ── دقة عالية للطباعة ──
  const ratio  = window.devicePixelRatio || 1;
  const width  = canvas.clientWidth  || canvas.offsetWidth  || 700;
  const height = 360;
  canvas.width  = width  * ratio;
  canvas.height = height * ratio;
  canvas.style.height = height + 'px';
  ctx.scale(ratio, ratio);

  // ── 1. خلفية بيضاء ──
  ctx.fillStyle = '#ffffff';
  ctx.fillRect(0, 0, width, height);

  // ── 2. بيانات هندسية ──
  const bw        = parseFloat(seg.base_width) || 2;
  const slopeStr  = seg.side_slope || '1:1';
  const sm        = slopeStr.match(/(\d+(?:\.\d+)?)\s*:\s*(\d+(?:\.\d+)?)/);
  const Hs        = sm ? parseFloat(sm[1]) : 1;
  const Vs        = sm ? parseFloat(sm[2]) : 1;
  const sideSlope = Hs / Vs;

  const baseLvl  = parseFloat(seg.base_level) || 0;
  const maxWL    = parseFloat(seg.max_wl)     || baseLvl + 2;
  const minWL    = parseFloat(seg.min_wl)     || baseLvl + 1;
  const waterDepth = Math.max(0.5, maxWL - baseLvl);
  const minDepth   = Math.max(0,   minWL - baseLvl);
  const freeBoard  = 1.0;
  const totalHeight= waterDepth + freeBoard;

  const topWidth = bw + 2 * totalHeight * sideSlope;

  // ── 3. مقياس الرسم ──
  const margin      = 60;
  const topPad      = 60;   // مساحة فوق للعناوين والأبعاد
  const botPad      = 60;   // مساحة تحت للـ labels والأبعاد
  const drawAreaW   = width  - margin * 2;
  const drawAreaH   = height - topPad - botPad;
  const scale       = Math.min(drawAreaW / (topWidth + 4), drawAreaH / (totalHeight + 1));

  const midX = width  / 2;
  const midY = topPad + drawAreaH - (drawAreaH - totalHeight * scale) / 2;

  const px = x => midX + x * scale;
  const py = y => midY - y * scale;

  // ── 4. شبكة إرشادية (f0f0f0) ──
  ctx.strokeStyle = '#f0f0f0';
  ctx.lineWidth   = 0.5;
  for (let i = 0; i < width;  i += 20) { ctx.beginPath(); ctx.moveTo(i,0);     ctx.lineTo(i,height); ctx.stroke(); }
  for (let i = 0; i < height; i += 20) { ctx.beginPath(); ctx.moveTo(0,i);     ctx.lineTo(width,i);  ctx.stroke(); }

  // ── 5. هاشور تربة خفيف جداً ──
  const xTL = -bw/2 - totalHeight * sideSlope;
  const xTR =  bw/2 + totalHeight * sideSlope;
  ctx.save();
  ctx.beginPath();
  ctx.moveTo(0,             py(totalHeight));
  ctx.lineTo(px(xTL),      py(totalHeight));
  ctx.lineTo(px(-bw/2),    py(0));
  ctx.lineTo(px(bw/2),     py(0));
  ctx.lineTo(px(xTR),      py(totalHeight));
  ctx.lineTo(width,         py(totalHeight));
  ctx.lineTo(width,         py(-0.3));
  ctx.lineTo(0,             py(-0.3));
  ctx.closePath();
  ctx.fillStyle = '#f8f8f8'; ctx.fill();
  ctx.clip();
  ctx.strokeStyle = '#e0e0e0'; ctx.lineWidth = 0.5;
  for (let i = -height * 2; i < width * 2; i += 8) {
    ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i + height, height); ctx.stroke();
  }
  ctx.restore();

  // ── 6. تعبئة المياه ──
  const xWL = -bw/2 - waterDepth * sideSlope;
  const xWR =  bw/2 + waterDepth * sideSlope;
  ctx.save();
  ctx.beginPath();
  ctx.moveTo(px(-bw/2), py(0));
  ctx.lineTo(px(xWL),   py(waterDepth));
  ctx.lineTo(px(xWR),   py(waterDepth));
  ctx.lineTo(px(bw/2),  py(0));
  ctx.closePath();
  ctx.fillStyle = 'rgba(173,216,235,0.45)'; ctx.fill();
  ctx.restore();

  // ── 7. جسم الترعة (أسود عريض) ──
  ctx.beginPath();
  ctx.strokeStyle = '#000000';
  ctx.lineWidth   = 2.5;
  ctx.lineJoin    = 'miter';
  ctx.lineCap     = 'square';

  ctx.moveTo(0,              py(totalHeight));   // امتداد أيسر
  ctx.lineTo(px(xTL),       py(totalHeight));
  ctx.lineTo(px(-bw/2),     py(0));
  ctx.lineTo(px(bw/2),      py(0));
  ctx.lineTo(px(xTR),       py(totalHeight));
  ctx.lineTo(width,          py(totalHeight));   // امتداد أيمن
  ctx.stroke();

  // خط القاع الممتد (منقط)
  ctx.strokeStyle = '#666'; ctx.lineWidth = 0.8; ctx.setLineDash([6,5]);
  ctx.beginPath(); ctx.moveTo(0, py(0)); ctx.lineTo(px(xTL), py(0)); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(px(xTR), py(0)); ctx.lineTo(width, py(0)); ctx.stroke();
  ctx.setLineDash([]);

  // ── 8. خطوط المناسيب ──
  // أقصى منسوب مياه (أزرق متقطع)
  ctx.strokeStyle = '#0066cc'; ctx.lineWidth = 1.5; ctx.setLineDash([8,5]);
  ctx.beginPath();
  ctx.moveTo(0,         py(waterDepth));
  ctx.lineTo(width,     py(waterDepth));
  ctx.stroke();
  ctx.setLineDash([]);

  // رمز المثلث الهندسى عند المنتصف
  ctx.fillStyle = '#0066cc';
  ctx.beginPath();
  ctx.moveTo(px(0), py(waterDepth));
  ctx.lineTo(px(0)-8, py(waterDepth)-14);
  ctx.lineTo(px(0)+8, py(waterDepth)-14);
  ctx.closePath(); ctx.fill();

  // أدنى منسوب مياه (أزرق فاتح منقط)
  if (minDepth > 0.05) {
    ctx.strokeStyle = '#2196F3'; ctx.lineWidth = 1.2; ctx.setLineDash([6,5]);
    const xML = -bw/2 - minDepth*sideSlope;
    const xMR =  bw/2 + minDepth*sideSlope;
    ctx.beginPath(); ctx.moveTo(px(xML)-10, py(minDepth)); ctx.lineTo(px(xMR)+10, py(minDepth)); ctx.stroke();
    ctx.setLineDash([]);
  }

  // منسوب الجسر (أخضر منقط)
  ctx.strokeStyle = '#2e7d32'; ctx.lineWidth = 1.2; ctx.setLineDash([10,5]);
  ctx.beginPath(); ctx.moveTo(0, py(totalHeight)); ctx.lineTo(width, py(totalHeight)); ctx.stroke();
  ctx.setLineDash([]);

  // ── 9. الأبعاد الأفقية ──
  // Tick mark helper
  function tick(x, y) {
    ctx.save(); ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(x-5,y+5); ctx.lineTo(x+5,y-5); ctx.stroke();
    ctx.restore();
  }

  function hDim(x1, x2, yLvl, lbl, col, yOffsetPx) {
    const yPos = py(yLvl) + yOffsetPx;
    ctx.save();
    ctx.strokeStyle = col; ctx.fillStyle = col; ctx.lineWidth = 0.9;
    ctx.beginPath();
    ctx.moveTo(px(x1), py(yLvl)+3); ctx.lineTo(px(x1), yPos+6);
    ctx.moveTo(px(x2), py(yLvl)+3); ctx.lineTo(px(x2), yPos+6);
    ctx.moveTo(px(x1), yPos);       ctx.lineTo(px(x2), yPos);
    ctx.stroke();
    tick(px(x1), yPos); tick(px(x2), yPos);
    ctx.font = 'bold 11px Arial, Cairo'; ctx.textAlign = 'center';
    const lx = (px(x1)+px(x2))/2;
    const lw = ctx.measureText(lbl).width + 10;
    ctx.fillStyle = '#fff'; ctx.fillRect(lx-lw/2, yPos-13, lw, 14);
    ctx.fillStyle = col; ctx.fillText(lbl, lx, yPos-2);
    ctx.restore();
  }

  // b = عرض القاع (أسفل)
  hDim(-bw/2, bw/2, 0, `b = ${bw} م`, '#333', 30);
  // T = عرض سطح المياه (فوق)
  hDim(xWL, xWR, waterDepth, `T = ${(bw + 2*waterDepth*sideSlope).toFixed(2)} م`, '#0066cc', -28);

  // ── 10. الأبعاد الرأسية (يمين) ──
  function vDim(y1, y2, lbl, col, xOff) {
    const xL = px(xTR) + (xOff||32);
    ctx.save();
    ctx.strokeStyle = col; ctx.fillStyle = col; ctx.lineWidth = 0.9;
    ctx.setLineDash([3,3]);
    ctx.beginPath();
    ctx.moveTo(px(xTR)+2, py(y1)); ctx.lineTo(xL+8, py(y1));
    ctx.moveTo(px(xTR)+2, py(y2)); ctx.lineTo(xL+8, py(y2));
    ctx.setLineDash([]);
    ctx.moveTo(xL, py(y1)); ctx.lineTo(xL, py(y2));
    ctx.stroke();
    tick(xL, py(y1)); tick(xL, py(y2));
    ctx.font = 'bold 10px Arial, Cairo';
    const lw = ctx.measureText(lbl).width + 6;
    const mid = (py(y1)+py(y2))/2;
    ctx.save();
    ctx.translate(xL+lw/2+5, mid); ctx.rotate(-Math.PI/2);
    ctx.fillStyle = '#fff'; ctx.fillRect(-lw/2,-8,lw,14);
    ctx.fillStyle = col; ctx.textAlign = 'center'; ctx.fillText(lbl,0,3);
    ctx.restore();
    ctx.restore();
  }

  vDim(0, waterDepth,  `y = ${waterDepth.toFixed(2)} م`,   '#0066cc', 32);
  vDim(waterDepth, totalHeight, `${freeBoard.toFixed(2)} م`, '#2e7d32', 68);

  // ── 11. تسميات المناسيب (يسار) ──
  function elevLbl(yLvl, lbl, val, col, dash) {
    const xEnd = px(xTL) - 8;
    const yP   = py(yLvl);
    ctx.save();
    ctx.strokeStyle = col; ctx.lineWidth = 1.2;
    if (dash) ctx.setLineDash(dash);
    ctx.beginPath(); ctx.moveTo(xEnd, yP); ctx.lineTo(12, yP); ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle = col;
    ctx.beginPath(); ctx.moveTo(xEnd,yP); ctx.lineTo(xEnd-9,yP-4); ctx.lineTo(xEnd-9,yP+4); ctx.closePath(); ctx.fill();
    ctx.font = 'bold 10px Arial, Cairo'; ctx.textAlign = 'right';
    const txt = `${lbl}: ${val.toFixed(2)} م`;
    const tw  = ctx.measureText(txt).width + 8;
    ctx.fillStyle = '#fff'; ctx.fillRect(10, yP-10, tw, 17);
    ctx.fillStyle = col; ctx.fillText(txt, 10+tw-4, yP+4);
    ctx.restore();
  }

  elevLbl(0,           baseLvl,           'منسوب القاع',      '#333');
  elevLbl(waterDepth,  maxWL,             'أقصى منسوب مياه',  '#0066cc');
  if (minDepth > 0.05)
    elevLbl(minDepth,  minWL,             'أدنى منسوب مياه',  '#2196F3', [7,4]);
  elevLbl(totalHeight, baseLvl+totalHeight,'منسوب الجسر',     '#2e7d32', [10,5]);

  // ── 12. الميل على الوجهين (نمط كسر) ──
  [
    [-(bw/2 + waterDepth*sideSlope*0.5), waterDepth*0.48],
    [ (bw/2 + waterDepth*sideSlope*0.5), waterDepth*0.48]
  ].forEach(([xx, yy]) => {
    const cx2=px(xx), cy2=py(yy);
    ctx.fillStyle='rgba(255,255,255,0.92)';
    ctx.fillRect(cx2-15, cy2-22, 30, 34);
    ctx.strokeStyle='#ccc'; ctx.lineWidth=0.7;
    ctx.strokeRect(cx2-15, cy2-22, 30, 34);
    ctx.font='bold 11px Arial'; ctx.fillStyle='#c0392b'; ctx.textAlign='center';
    ctx.fillText(`${Hs}`, cx2, cy2-7);
    ctx.strokeStyle='#c0392b'; ctx.lineWidth=1.3;
    ctx.beginPath(); ctx.moveTo(cx2-11, cy2+1); ctx.lineTo(cx2+11, cy2+1); ctx.stroke();
    ctx.fillText(`${Vs}`, cx2, cy2+16);
  });

  // ── 13. العنوان ──
  ctx.font = 'bold 14px Cairo, Arial'; ctx.fillStyle = '#0d47a1'; ctx.textAlign = 'center';
  ctx.fillText(
    canal.name ? `القطاع العرضى: ${canal.name}` : 'القطاع العرضى النموذجى',
    width/2, 24
  );
  ctx.font = '10px Cairo, Arial'; ctx.fillStyle = '#444';
  ctx.fillText(
    `عرض القاع: ${bw}م  |  ميل: ${Hs}:${Vs}  |  منسوب القاع: ${baseLvl.toFixed(2)}م  |  عمق المياه: ${waterDepth.toFixed(2)}م`,
    width/2, 44
  );

  // ── 14. مقياس الرسم (أسفل يسار) ──
  ctx.save();
  const sbX=14, sbY2=height-14, sq=scale;
  ctx.font='8px Arial'; ctx.fillStyle='#555'; ctx.textAlign='left';
  ctx.fillText('مقياس: 1 مربع = 1 م', sbX, sbY2-sq/2-6);
  for(let i=0;i<5;i++){
    ctx.fillStyle=i%2===0?'#444':'#fff';
    ctx.fillRect(sbX+i*sq, sbY2-sq/2, sq, sq/2);
    ctx.strokeStyle='#333'; ctx.lineWidth=0.8;
    ctx.strokeRect(sbX+i*sq, sbY2-sq/2, sq, sq/2);
  }
  ctx.font='8px Arial'; ctx.fillStyle='#333'; ctx.textAlign='center';
  ctx.fillText('0', sbX, sbY2+9);
  ctx.fillText('5م', sbX+5*sq, sbY2+9);
  ctx.restore();

  // ── تحديث شريط المعلومات ──
  const infoEl = document.getElementById('segInfo');
  if (infoEl) infoEl.textContent =
    `عرض قاع: ${bw}م | ميل: ${Hs}:${Vs} | منسوب القاع: ${baseLvl.toFixed(2)}م | عمق المياه: ${waterDepth.toFixed(2)}م`;
}




// ─── PROFILE CHART ────────────────────────────────────────────
function parseIrrigationNum(val) {
  if (val === null || val === undefined || val === "") return NaN;
  if (typeof val === 'number') return val;
  const s = val.toString().trim();
  if (s === "الفم") return 0;
  const cleaned = s.replace(/[^\d.-]/g, '');
  return parseFloat(cleaned);
}

function drawProfile(canal) {
  const canvas = document.getElementById('profileChart');
  if (!canvas) return;
  const W = canvas.offsetWidth || canvas.parentElement?.offsetWidth || 700;
  const H = 200;
  canvas.width = W;
  canvas.height = H;
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, W, H);

  // 1. تجهيز البيانات وتصفيتها من القيم غير الصالحة
  const validSegments = canal.segments.filter(s => {
    const bl = parseIrrigationNum(s.base_level);
    const wl = parseIrrigationNum(s.max_wl);
    return !isNaN(bl) && !isNaN(wl);
  });

  if (validSegments.length < 1) {
    ctx.fillStyle = 'rgba(255,255,255,0.3)';
    ctx.font = '14px Cairo';
    ctx.textAlign = 'center';
    ctx.fillText('لا توجد بيانات كافية لرسم البروفيل', W/2, H/2);
    return;
  }

  // 2. إعدادات الهوامش والمقياس
  const pad = { l: 60, r: 30, t: 30, b: 40 };
  const gW = W - pad.l - pad.r;
  const gH = H - pad.t - pad.b;

  // حساب الإحداثيات الأفقية مع cursor لمعالجة "الفم" والقيم غير الرقمية
  let cursor = 0;
  const segs = validSegments.map(s => {
    let x0 = parseIrrigationNum(s.from_k);
    let x1 = parseIrrigationNum(s.to_k);
    if (isNaN(x0)) x0 = cursor;
    if (isNaN(x1)) x1 = x0 + 1;
    cursor = x1;
    return { ...s, x0, x1 };
  });

  const minX = Math.min(...segs.map(s => s.x0));
  const maxX = Math.max(...segs.map(s => s.x1));
  const rangeX = (maxX - minX) || 1;

  // حساب المدى الرأسي (المناسيب)
  const allY = segs.flatMap(s => [parseIrrigationNum(s.base_level), parseIrrigationNum(s.max_wl)]).filter(v => !isNaN(v));
  const minY = Math.min(...allY) - 0.5;
  const maxY = Math.max(...allY) + 0.5;
  const rangeY = (maxY - minY) || 1;

  // دوال التحويل من إحداثيات هندسية إلى بكسل
  const sx = (x) => pad.l + ((x - minX) / rangeX) * gW;
  const sy = (y) => pad.t + gH - ((y - minY) / rangeY) * gH;

  // 3. رسم الشبكة الخلفية (Grid)
  ctx.strokeStyle = 'rgba(255,255,255,0.08)';
  ctx.lineWidth = 0.5;
  ctx.font = '10px Tahoma';
  ctx.fillStyle = 'rgba(255,255,255,0.4)';
  ctx.textAlign = 'right';

  for (let i = 0; i <= 4; i++) {
    const yVal = minY + (rangeY * i / 4);
    const yPos = sy(yVal);
    ctx.beginPath(); ctx.moveTo(pad.l, yPos); ctx.lineTo(W - pad.r, yPos); ctx.stroke();
    ctx.fillText(yVal.toFixed(2), pad.l - 8, yPos + 4);
  }

  // 4. رسم منطقة القاع (التعبئة الأرضية)
  ctx.beginPath();
  ctx.moveTo(sx(segs[0].x0), sy(minY));
  segs.forEach(s => {
    ctx.lineTo(sx(s.x0), sy(parseIrrigationNum(s.base_level)));
    ctx.lineTo(sx(s.x1), sy(parseIrrigationNum(s.base_level)));
  });
  ctx.lineTo(sx(segs[segs.length-1].x1), sy(minY));
  ctx.closePath();
  ctx.fillStyle = 'rgba(141, 110, 99, 0.15)';
  ctx.fill();

  // 5. رسم خط القاع (الأحمر)
  ctx.beginPath();
  ctx.strokeStyle = '#e57373';
  ctx.lineWidth = 2.5;
  segs.forEach((s, i) => {
    if (i === 0) ctx.moveTo(sx(s.x0), sy(parseIrrigationNum(s.base_level)));
    else ctx.lineTo(sx(s.x0), sy(parseIrrigationNum(s.base_level)));
    ctx.lineTo(sx(s.x1), sy(parseIrrigationNum(s.base_level)));
  });
  ctx.stroke();

  // 6. رسم منطقة المياه (التعبئة الزرقاء)
  ctx.beginPath();
  ctx.moveTo(sx(segs[0].x0), sy(parseIrrigationNum(segs[0].base_level)));
  segs.forEach(s => {
    ctx.lineTo(sx(s.x0), sy(parseIrrigationNum(s.base_level)));
    ctx.lineTo(sx(s.x1), sy(parseIrrigationNum(s.base_level)));
  });
  for (let i = segs.length - 1; i >= 0; i--) {
    ctx.lineTo(sx(segs[i].x1), sy(parseIrrigationNum(segs[i].max_wl)));
    ctx.lineTo(sx(segs[i].x0), sy(parseIrrigationNum(segs[i].max_wl)));
  }
  ctx.closePath();
  const waterGrad = ctx.createLinearGradient(0, pad.t, 0, pad.t + gH);
  waterGrad.addColorStop(0, 'rgba(79, 195, 247, 0.4)');
  waterGrad.addColorStop(1, 'rgba(79, 195, 247, 0.1)');
  ctx.fillStyle = waterGrad;
  ctx.fill();

  // 7. رسم خط أقصى مياه (الأزرق)
  ctx.beginPath();
  ctx.strokeStyle = '#4fc3f7';
  ctx.lineWidth = 2.5;
  segs.forEach((s, i) => {
    if (i === 0) ctx.moveTo(sx(s.x0), sy(parseIrrigationNum(s.max_wl)));
    else ctx.lineTo(sx(s.x0), sy(parseIrrigationNum(s.max_wl)));
    ctx.lineTo(sx(s.x1), sy(parseIrrigationNum(s.max_wl)));
  });
  ctx.stroke();

  // 8. المحور الأفقي (الكيلومترات)
  ctx.textAlign = 'center';
  ctx.fillStyle = 'rgba(255,255,255,0.5)';
  ctx.font = '10px Cairo';
  const steps = 6;
  for (let i = 0; i <= steps; i++) {
    const xVal = minX + (rangeX * i / steps);
    ctx.fillText(xVal.toFixed(1) + ' ك', sx(xVal), H - 10);
  }
}

// ─── PRINT ────────────────────────────────────────────────────
function printCanal() {
  if (!currentCanal) {
    alert("يرجى اختيار ترعة أولاً");
    return;
  }

  try {
    // 1. إظهار الهيدر الخاص بالطباعة
    const ph = document.querySelector('.print-header');
    if (ph) ph.style.display = 'block';

    // 2. تحديث الرسوم البيانية الحالية قبل الطباعة لضمان ظهورها
    if (typeof drawCrossSection === "function") drawCrossSection(currentCanal);
    if (typeof drawProfile === "function") drawProfile(currentCanal);

    // 3. محاولة توليد القطاعات لكل الأقسام (اختياري)
    if (typeof renderAllSegmentSections === "function") {
      renderAllSegmentSections(currentCanal);
    }

    // 4. استدعاء أمر الطباعة بعد تأخير بسيط للتأكد من الرندر
    setTimeout(() => {
      window.print();

      // إخفاء هيدر الطباعة بعد الإغلاق
      if (ph) ph.style.display = 'none';
      // تنظيف القطاعات الإضافية
      document.querySelectorAll('.print-seg-canvas-wrap').forEach(el => el.remove());
    }, 500);

  } catch (error) {
    console.error("خطأ أثناء التحضير للطباعة:", error);
    window.print();
  }
}

function renderAllSegmentSections(canal) {
  // Remove previous
  document.querySelectorAll('.print-seg-canvas-wrap').forEach(el => el.remove());

  const csWrap = document.querySelector('.cross-section-wrap');
  if (!csWrap || canal.segments.length <= 1) return;

  const container = document.createElement('div');
  container.className = 'print-seg-canvas-wrap';
  container.style.cssText = 'display:none'; // hidden on screen, shown in print via CSS
  container.innerHTML = '<div style="font-weight:700;font-size:13px;color:#003366;margin:10px 0 6px;border-bottom:1px solid #ccd;padding-bottom:4px">القطاعات العرضية لجميع الأقسام</div>';

  canal.segments.forEach((seg, i) => {
    const segDiv = document.createElement('div');
    segDiv.style.cssText = 'margin-bottom:10px;page-break-inside:avoid';
    segDiv.innerHTML = `<div style="font-size:11px;color:#003366;font-weight:600;margin-bottom:4px">قسم ${i+1}: من ${seg.from_k} إلى ${seg.to_k} ك — عرض قاع ${seg.base_width}م — ميل ${seg.side_slope}</div>`;
    const cv = document.createElement('canvas');
    cv.width = 900; cv.height = 200;
    cv.style.cssText = 'width:100%;border:1px solid #dde;border-radius:4px';
    segDiv.appendChild(cv);
    container.appendChild(segDiv);

    // Draw on this canvas
    drawCrossSectionOnCanvas(cv, seg, 200);
  });

  // Insert after cross section wrap
  csWrap.parentNode.insertBefore(container, csWrap.nextSibling);
}

function drawCrossSectionOnCanvas(canvas, seg, canvasH) {
  if (!canvas || !seg) return;
  const ctx = canvas.getContext('2d');
  const width = canvas.width;
  const height = canvasH;

  const bw = parseFloat(seg.base_width) || 2;
  const baseLvl = parseIrrigationNum(seg.base_level) || 0;
  const maxWL = parseIrrigationNum(seg.max_wl) || (baseLvl + 2);
  const sideSlope = parseIrrigationNum(seg.side_slope) || 1;
  const waterDepth = Math.max(0.5, maxWL - baseLvl);
  const totalH = waterDepth + 1.0;

  const scale = Math.min((width - 100) / (bw + 10), (height - 60) / (totalH + 1));
  const midX = width / 2;
  const midY = height - 30;

  const px = x => midX + x * scale;
  const py = y => midY - y * scale;

  ctx.fillStyle = "#fff";
  ctx.fillRect(0, 0, width, height);

  ctx.beginPath();
  ctx.strokeStyle = "#000";
  ctx.lineWidth = 2;
  ctx.moveTo(px(-bw/2 - 5), py(totalH));
  ctx.lineTo(px(-bw/2), py(0));
  ctx.lineTo(px(bw/2), py(0));
  ctx.lineTo(px(bw/2 + 5), py(totalH));
  ctx.stroke();

  // خط المياه
  ctx.beginPath();
  ctx.strokeStyle = "#0066cc";
  ctx.setLineDash([5, 5]);
  ctx.moveTo(px(-bw/2 - waterDepth * sideSlope), py(waterDepth));
  ctx.lineTo(px(bw/2 + waterDepth * sideSlope), py(waterDepth));
  ctx.stroke();
  ctx.setLineDash([]);
}

// Also add print CSS for the extra segment canvases
const printStyle = document.createElement('style');
printStyle.textContent = `
  @media print {
    .print-seg-canvas-wrap { display: block !important; page-break-before: always; }
    .print-seg-canvas-wrap canvas { width: 100% !important; height: auto !important; }
    .no-print { display: none !important; }
  }
  @media screen { .print-seg-canvas-wrap { display: none !important; } }
`;
document.head.appendChild(printStyle);

// ─── RESIZE HANDLER ───────────────────────────────────────────
window.addEventListener('resize', () => {
  if (currentCanal) {
    drawCrossSection(currentCanal);
    drawProfile(currentCanal);
  }
});

// ─── START ────────────────────────────────────────────────────
init();

// Event delegation للأزرار داخل detail
document.getElementById('detail').addEventListener('click', e => {
  if (e.target.closest('#printBtn')) printCanal();
});
</script>
